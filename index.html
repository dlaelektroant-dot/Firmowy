<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElektroAnt - Zamówienia</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --muted:#cbd5e1;
    --accent:#06b6d4;
}

.light{
    --bg1:#e2e8f0;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --muted:#334155;
    --accent:#0ea5e9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    transition:0.3s;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    font-weight:bold;
}

/* MODE BUTTONS */
.mode-box{
    display:flex;
    gap:15px;
}

.mode{
    width:80px;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:20px;
    cursor:pointer;
    font-size:40px;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.2);
    transition:0.2s;
}

.mode:hover{
    transform:scale(1.1);
}

header{
    text-align:center;
    padding:40px 20px;
}

header img{
    width:160px;
    border-radius:20px;
}

header h1{
    margin-top:15px;
}

/* PRODUCT GRID */
.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:30px 0;
}

.product-card{
    position:relative;
    width:260px;
    cursor:pointer;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
    background:var(--card);
}

.product-card:hover{
    transform:scale(1.05);
}

.product-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    display:block;
}

.price-tag{
    position:absolute;
    bottom:10px;
    right:10px;
    background:var(--accent);
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
    color:white;
    font-size:18px;
}

/* CART */
.cart-box{
    max-width:600px;
    margin:20px auto;
    background:var(--card);
    padding:20px;
    border-radius:20px;
    display:none;
}

.cart-title{
    font-size:22px;
    margin-bottom:10px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.cart-total{
    font-size:20px;
    margin-top:15px;
    font-weight:bold;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* FORM */
.form-box{
    max-width:600px;
    margin:30px auto;
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
}

input,select,textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">ElektroAnt ⚡</div>

    <div class="mode-box">
        <div class="mode" onclick="setLight()">☀️</div>
        <div class="mode" onclick="setDark()">☾</div>
    </div>
</div>

<header>
<img src="p1.png">
<h1>ElektroAnt</h1>
<p>Falowniki • Automatyka • Szafy Sterownicze</p>
</header>

<!-- 🔥 3 KLIKALNE PRODUKTY -->
<div class="products">

    <div class="product-card" onclick="addToCart('Falownik',499)">
        <img src="p1.png">
        <div class="price-tag">od 499 zł</div>
    </div>

    <div class="product-card" onclick="addToCart('Szafa sterownicza',1299)">
        <img src="https://images.unsplash.com/photo-1581091012184-5c1d2d7f3c5b?w=500">
        <div class="price-tag">od 1299 zł</div>
    </div>

    <div class="product-card" onclick="addToCart('Programowanie PLC',199)">
        <img src="https://images.unsplash.com/photo-1581090700227-1e37b3c2c2a3?w=500">
        <div class="price-tag">od 199 zł/h</div>
    </div>

    <div class="products">

    <div class="product-card" onclick="addToCart('Falownik',499)">
        <img src="p1.png">
        <div class="price-tag">od 499 zł</div>
    </div>

    <div class="product-card" onclick="addToCart('Szafa sterownicza',1299)">
        <img src="https://images.unsplash.com/photo-1581091012184-5c1d2d7f3c5b?w=500">
        <div class="price-tag">od 1299 zł</div>
    </div>

    <div class="product-card" onclick="addToCart('Programowanie PLC',199)">
        <img src="https://images.unsplash.com/photo-1581090700227-1e37b3c2c2a3?w=500">
        <div class="price-tag">od 199 zł/h</div>
    </div>

<!-- 🛒 KOSZYK -->
<div class="cart-box" id="cartBox">
    <div class="cart-title">🛒 Twój koszyk</div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Suma: 0 zł</div>
</div>

<div class="form-box">

<h2>Złóż zamówienie</h2>

<form id="zamowienie" action="https://formsubmit.co/TWOJ_EMAIL@gmail.com" method="POST">

<input type="text" name="Imie" placeholder="Imię" required>
<input type="tel" name="Telefon" placeholder="Numer telefonu" required>

<textarea id="summary" name="Podsumowanie" style="display:none"></textarea>

<button type="submit">Wyślij zamówienie</button>

</form>

</div>

<script>
function setLight(){
    document.body.classList.add("light");
    localStorage.setItem("mode","light");
}

function setDark(){
    document.body.classList.remove("light");
    localStorage.setItem("mode","dark");
}

window.onload = () => {
    if(localStorage.getItem("mode")==="light"){
        document.body.classList.add("light");
    }
}

/* 🛒 KOSZYK 2.0 */
let cart = [];

function addToCart(name, price){
    let item = cart.find(p => p.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty: 1});
    }

    updateCart();
}

function removeFromCart(name){
    cart = cart.filter(p => p.name !== name);
    updateCart();
}

function updateCart(){
    const box = document.getElementById("cartBox");
    const items = document.getElementById("cartItems");
    const totalBox = document.getElementById("cartTotal");

    if(cart.length === 0){
        box.style.display = "none";
        return;
    }

    box.style.display = "block";

    let html = "";
    let total = 0;

    cart.forEach(item=>{
        let sum = item.price * item.qty;
        total += sum;

        html += `
            <div class="cart-item">
                <span>${item.name} (x${item.qty})</span>
                <span>${sum} zł</span>
                <button class="remove-btn" onclick="removeFromCart('${item.name}')">Usuń</button>
            </div>
        `;
    });

    items.innerHTML = html;
    totalBox.innerText = "Suma: " + total + " zł";

    generateSummary();
}

function generateSummary(){
    let summary = "Podsumowanie zamówienia:\n\n";

    cart.forEach(item=>{
        summary += `${item.name} x${item.qty} = ${item.price * item.qty} zł\n`;
    });

    document.getElementById("summary").value = summary;
}
</script>

</body>
</html>
