<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElektroAnt - Zamówienia</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --muted:#cbd5e1;
    --accent:#06b6d4;
}

/* LIGHT MODE */
.light{
    --bg1:#e2e8f0;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --muted:#334155;
    --accent:#0ea5e9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    transition:0.3s;
}

header{
    text-align:center;
    padding:60px 20px;
}

header img{
    width:180px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,255,.4);
}

header h1{
    margin-top:20px;
    font-size:3em;
}

header p{
    color:var(--muted);
}

.form-box{
    max-width:600px;
    margin:30px auto;
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
}

input,select,textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.toggle{
    background:transparent;
    border:1px solid var(--text);
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    color:var(--text);
}

.info{
    text-align:center;
    padding:40px;
    color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">
    <h3>ElektroAnt ⚡</h3>
    <button class="toggle" onclick="toggleMode()">🌙 / ☀️</button>
</div>

<header>
<img src="https://images.unsplash.com/photo-1581092160607-ee22731d8b2e?w=500" alt="Automatyka">
<h1>ElektroAnt</h1>
<p>Falowniki • Automatyka • Szafy Sterownicze</p>
</header>

<div class="form-box">
<h2>Złóż zamówienie</h2>

<form action="https://formsubmit.co/TWOJ_EMAIL@gmail.com" method="POST">

<input type="text" name="Imie" placeholder="Imię" required>

<input type="tel" name="Telefon" placeholder="Numer telefonu" required>

<select name="Produkt">
<option>Falownik</option>
<option>Szafa sterownicza</option>
<option>Programowanie PLC</option>
<option>Automatyka przemysłowa</option>
</select>

<textarea name="Opis" rows="5" placeholder="Opis zamówienia"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit">Wyślij zamówienie</button>

</form>
</div>

<div class="info">
<h2>⚡ Profesjonalne rozwiązania dla przemysłu</h2>
<p>Szybka realizacja i wsparcie techniczne.</p>
</div>

<script>
function toggleMode(){
    document.body.classList.toggle("light");
    
    if(document.body.classList.contains("light")){
        localStorage.setItem("mode","light");
    } else {
        localStorage.setItem("mode","dark");
    }
}

window.onload = function(){
    if(localStorage.getItem("mode") === "light"){
        document.body.classList.add("light");
    }
}
</script>

</body>
</html>
