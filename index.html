<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElektroAnt - Zamówienia</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --muted:#cbd5e1;
    --accent:#06b6d4;
}

.light{
    --bg1:#e2e8f0;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --muted:#334155;
    --accent:#0ea5e9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    transition:0.3s;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    font-weight:bold;
}

/* ICONS */
.mode-icons{
    display:flex;
    gap:15px;
    align-items:center;
}

.mode-btn{
    width:55px;
    height:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    cursor:pointer;
    transition:0.2s;
    border:1px solid rgba(255,255,255,0.15);
}

.mode-btn:hover{
    transform:scale(1.1);
    background:rgba(255,255,255,0.15);
}

.mode-btn img{
    width:35px;
    height:35px;
}

/* HEADER */
header{
    text-align:center;
    padding:40px 20px;
}

header img{
    width:160px;
    border-radius:20px;
}

header h1{
    margin-top:15px;
    font-size:2.5em;
}

/* FORM */
.form-box{
    max-width:600px;
    margin:30px auto;
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
}

input,select,textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* INFO */
.info{
    text-align:center;
    padding:40px;
    color:var(--muted);
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">ElektroAnt ⚡</div>

    <div class="mode-icons">

        <!-- SUN -->
        <div class="mode-btn" onclick="setLight()" title="Jasny tryb">
            <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
        </div>

        <!-- MOON (WYRAŹNY) -->
        <div class="mode-btn" onclick="setDark()" title="Ciemny tryb">
            <img src="https://cdn-icons-png.flaticon.com/512/1164/1164954.png">
        </div>

    </div>
</div>

<header>
<img src="https://images.unsplash.com/photo-1581092160607-ee22731d8b2e?w=500">
<h1>ElektroAnt</h1>
<p>Falowniki • Automatyka • Szafy Sterownicze</p>
</header>

<div class="form-box">
<h2>Złóż zamówienie</h2>

<form action="https://formsubmit.co/TWOJ_EMAIL@gmail.com" method="POST">

<input type="text" name="Imie" placeholder="Imię" required>
<input type="tel" name="Telefon" placeholder="Numer telefonu" required>

<select name="Produkt">
<option>Falownik</option>
<option>Szafa sterownicza</option>
<option>Programowanie PLC</option>
<option>Automatyka przemysłowa</option>
</select>

<textarea name="Opis" rows="5" placeholder="Opis zamówienia"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit">Wyślij zamówienie</button>

</form>
</div>

<div class="info">
<h2>⚡ Profesjonalne rozwiązania</h2>
<p>Szybka realizacja i wsparcie techniczne.</p>
</div>

<script>
function setLight(){
    document.body.classList.add("light");
    localStorage.setItem("mode","light");
}

function setDark(){
    document.body.classList.remove("light");
    localStorage.setItem("mode","dark");
}

window.onload = function(){
    if(localStorage.getItem("mode")==="light"){
        document.body.classList.add("light");
    }
}
</script>

</body>
</html>
