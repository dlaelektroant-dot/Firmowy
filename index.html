<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zamówienie</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}
.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
input, select, button{
    width:100%;
    padding:10px;
    margin-top:10px;
}
button{
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>Złóż zamówienie</h1>

<form action="https://formsubmit.co/TWOJ_EMAIL@gmail.com" method="POST">

<label>Numer telefonu:</label>
<input type="tel" name="Telefon" required>

<label>Produkt:</label>
<select name="Produkt">
    <option>Szafa sterownicza</option>
    <option>Falownik</option>
    <option>Automatyka</option>
</select>

<label>Uwagi:</label>
<input type="text" name="Uwagi">

<button type="submit">Wyślij zamówienie</button>

<input type="hidden" name="_captcha" value="false">

</form>

</div>

</body>
</html>
