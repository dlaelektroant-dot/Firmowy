<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>firma - Zamówienia</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --muted:#cbd5e1;
    --accent:#06b6d4;
}

.light{
    --bg1:#e2e8f0;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --muted:#334155;
    --accent:#0ea5e9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    transition:0.3s;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    font-weight:bold;
}

/* MODE BUTTONS */
.mode-box{
    display:flex;
    gap:15px;
}

.mode{
    width:80px;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:20px;
    cursor:pointer;
    font-size:40px;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.2);
    transition:0.2s;
}

.mode:hover{
    transform:scale(1.1);
}

header{
    text-align:center;
    padding:40px 20px;
}

header img{
    width:160px;
    border-radius:20px;
}

header h1{
    margin-top:15px;
}

/* PRODUCT GRID */
.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:30px 0;
}

.product-card{
    position:relative;
    width:260px;
    cursor:pointer;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
    background:var(--card);
    padding-bottom:10px;
}

.product-card:hover{
    transform:scale(1.05);
}

.product-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    display:block;
}

.product-name{
    text-align:center;
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.price-tag{
    position:absolute;
    bottom:10px;
    right:10px;
    background:var(--accent);
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
    color:white;
    font-size:18px;
}

/* CART */
.cart-box{
    max-width:600px;
    margin:20px auto;
    background:var(--card);
    padding:20px;
    border-radius:20px;
    display:none;
}

.cart-title{
    font-size:22px;
    margin-bottom:10px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.cart-total{
    font-size:20px;
    margin-top:15px;
    font-weight:bold;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

/* FORM */
.form-box{
    max-width:600px;
    margin:30px auto;
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
}

input,select,textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:18px;
}

/* AI HELPER FLOATING BUTTON */
.ai-helper{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    background:var(--accent);
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    z-index:999;
}

.ai-bubble{
    position:fixed;
    bottom:100px;
    right:20px;
    background:var(--card);
    padding:15px;
    border-radius:15px;
    width:220px;
    display:none;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}
</style>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCV3Ckci_JcI-JPNHeUbIUwyQxBk-EmK7M",
    authDomain: "firma-zamowienia.firebaseapp.com",
    projectId: "firma-zamowienia",
    storageBucket: "firma-zamowienia.firebasestorage.app",
    messagingSenderId: "65145966967",
    appId: "1:65145966967:web:2737cd8d98d437cb064bf6",
    measurementId: "G-BP4MWD25N5"
  };

  window.firebaseApp = initializeApp(firebaseConfig);
  window.db = getFirestore(firebaseApp);
</script>

</head>

<body>

<div class="topbar">
    <div class="logo">firma</div>

    <div class="mode-box">
        <div class="mode" onclick="setLight()">☀️</div>
        <div class="mode" onclick="setDark()">☾</div>
    </div>
</div>

<header>
<img src="p1.png">
<h1>firma</h1>
<p>Falowniki • Automatyka • Szafy Sterownicze</p>
</header>

<!-- PRODUKTY -->
<div class="products">

    <div class="product-card">
        <img src="p1.png">
        <div class="product-name">Falownik</div>
        <div class="price-tag">od 499 zł</div>
        <button onclick="addToCart('Falownik', 499)">Dodaj do koszyka</button>
    </div>

    <div class="product-card">
        <img src="p2.png">
        <div class="product-name">Szafa sterownicza</div>
        <div class="price-tag">od 1299 zł</div>
        <button onclick="addToCart('Szafa sterownicza', 1299)">Dodaj do koszyka</button>
    </div>

    <div class="product-card">
        <img src="p3.png">
        <div class="product-name">Programowanie PLC</div>
        <div class="price-tag">199 zł</div>
        <button onclick="addToCart('Programowanie PLC', 199)">Dodaj do koszyka</button>
    </div>

</div>

<!-- KOSZYK -->
<div class="cart-box" id="cartBox">
    <div class="cart-title">🛒 Twój koszyk</div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Suma: 0 zł</div>
</div>

<!-- FORMULARZ -->
<div class="form-box">

<h2>Złóż zamówienie</h2>

<form id="zamowienie">

<label>Imię i nazwisko</label>
<input type="text" name="imie_nazwisko" placeholder="Imię i nazwisko" required>

<label>Adres</label>
<textarea name="adres" rows="3" placeholder="Ulica, numer, kod pocztowy, miejscowość" required></textarea>

<label>Numer telefonu</label>
<input type="tel" name="telefon" placeholder="Numer telefonu" required>

<label>Adres e‑mail</label>
<input type="email" name="email" placeholder="Adres e‑mail" required>

<label>NIP (opcjonalnie)</label>
<input type="text" name="nip" placeholder="NIP (niewymagany)">

<label>Dodatkowe informacje</label>
<textarea name="opis" rows="4" placeholder="Opisz czego potrzebujesz"></textarea>

<textarea id="summary" name="Podsumowanie" style="display:none"></textarea>

<button type="submit">Wyślij zamówienie</button>

<footer style="margin-top:20px;text-align:center;font-size:14px;">
  © firma <span id="year"></span>
  <a href="mailto:anteczex@gmail.com" style="color:var(--accent);text-decoration:none;">Kontakt z programistą</a>
</footer>

</form>

</div>

<!-- AI HELPER -->
<div class="ai-helper" onclick="toggleAI()">🤖</div>

<div class="ai-bubble" id="aiBubble">
    <b>AI Helper:</b><br>
    • Dodawaj produkty do koszyka<br>
    • Wypełnij dane<br>
    • Wyślij zamówienie<br>
</div>

<script>
// TRYB JASNY / CIEMNY
function setLight(){
    document.body.classList.add("light");
    localStorage.setItem("mode","light");
}

function setDark(){
    document.body.classList.remove("light");
    localStorage.setItem("mode","dark");
}

window.onload = () => {
    if(localStorage.getItem("mode")==="light"){
        document.body.classList.add("light");
    }
    document.getElementById("year").textContent = new Date().getFullYear();
};

// AI HELPER
function toggleAI(){
    const bubble = document.getElementById("aiBubble");
    bubble.style.display = bubble.style.display === "block" ? "none" : "block";
}

// KOSZYK
let cart = [];

function addToCart(name, price){
    let item = cart.find(p => p.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({name, price, qty: 1});
    }

    updateCart();
}

function removeFromCart(name){
    cart = cart.filter(p => p.name !== name);
    updateCart();
}

function updateCart(){
    const box = document.getElementById("cartBox");
    const items = document.getElementById("cartItems");
    const totalBox = document.getElementById("cartTotal");

    if(cart.length === 0){
        box.style.display = "none";
        return;
    }

    box.style.display = "block";

    let html = "";
    let total = 0;

    cart.forEach(item=>{
        let sum = item.price * item.qty;
        total += sum;

        html += `
            <div class="cart-item">
                <span>${item.name} (x${item.qty})</span>
                <span>${sum} zł</span>
                <button class="remove-btn" onclick="removeFromCart('${item.name}')">Usuń</button>
            </div>
        `;
    });

    items.innerHTML = html;
    totalBox.innerText = "Suma: " + total + " zł";

    generateSummary();
}

function generateSummary(){
    let summary = "Podsumowanie zamówienia:\n\n";

    cart.forEach(item=>{
        summary += `${item.name} x${item.qty} = ${item.price * item.qty} zł\n`;
    });

    document.getElementById("summary").value = summary;
}

// FIREBASE — ZAPIS ZAMÓWIENIA
async function submitToFirebase(){
    const { addDoc, collection } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");

    const imie_nazwisko = document.querySelector("input[name='imie_nazwisko']").value;
    const adres = document.querySelector("textarea[name='adres']").value;
    const telefon = document.querySelector("input[name='telefon']").value;
    const email = document.querySelector("input[name='email']").value;
    const nip = document.querySelector("input[name='nip']").value;
    const opis = document.querySelector("textarea[name='opis']").value;
    const podsumowanie = document.getElementById("summary").value;

    await addDoc(collection(window.db, "zamowienia"), {
        imie_nazwisko,
        adres,
        telefon,
        email,
        nip,
        opis,
        podsumowanie,
        data: new Date().toLocaleString()
    });

    alert("Zamówienie zostało wysłane!");
    document.getElementById("zamowienie").reset();
    cart = [];
    updateCart();
}

// WYSYŁANIE FORMULARZA
document.getElementById("zamowienie").addEventListener("submit", async function(e){
    e.preventDefault();
    await submitToFirebase();
});
</script>

</body>
</html>
