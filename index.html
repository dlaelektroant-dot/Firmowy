<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElektroAnt - Zamówienia</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --muted:#cbd5e1;
    --accent:#06b6d4;
}

.light{
    --bg1:#e2e8f0;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --muted:#334155;
    --accent:#0ea5e9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--text);
    transition:0.3s;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    font-weight:bold;
}

/* BIG MODE BUTTONS */
.mode-box{
    display:flex;
    gap:15px;
}

.mode{
    width:80px;
    height:80px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:20px;
    cursor:pointer;
    font-size:40px;
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.2);
    transition:0.2s;
}

.mode:hover{
    transform:scale(1.1);
}

header{
    text-align:center;
    padding:40px 20px;
}

header img{
    width:160px;
    border-radius:20px;
}

header h1{
    margin-top:15px;
}

/* PRODUCT CARD */
.product-card{
    position:relative;
    width:300px;
    margin:20px auto;
    cursor:pointer;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
    background:var(--card);
}

.product-card:hover{
    transform:scale(1.05);
}

.product-card img{
    width:100%;
    display:block;
}

.price-tag{
    position:absolute;
    bottom:10px;
    right:10px;
    background:var(--accent);
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
    color:white;
    font-size:18px;
}

/* FORM */
.form-box{
    max-width:600px;
    margin:30px auto;
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
}

input,select,textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:var(--accent);
    color:white;
    font-size:18px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">ElektroAnt ⚡</div>

    <div class="mode-box">
        <div class="mode" onclick="setLight()">☀️</div>
        <div class="mode" onclick="setDark()">☾</div>
    </div>
</div>

<header>
<img src="https://images.unsplash.com/photo-1581092160607-ee22731d8b2e?w=500">
<h1>ElektroAnt</h1>
<p>Falowniki • Automatyka • Szafy Sterownicze</p>
</header>

<!-- KLIKALNY PRODUKT -->
<div class="product-card" onclick="document.getElementById('zamowienie').scrollIntoView({behavior:'smooth'})">
    <img src="https://images.unsplash.com/photo-1581092160607-ee22731d8b2e?w=500">
    <div class="price-tag">od 499 zł</div>
</div>

<div class="form-box">

<h2>Złóż zamówienie</h2>

<form id="zamowienie" action="https://formsubmit.co/TWOJ_EMAIL@gmail.com" method="POST">

<input type="text" name="Imie" placeholder="Imię" required>
<input type="tel" name="Telefon" placeholder="Numer telefonu" required>

<select name="Produkt">
<option>Falownik</option>
<option>Szafa sterownicza</option>
<option>Programowanie PLC</option>
<option>Automatyka przemysłowa</option>
</select>

<textarea name="Opis" rows="5" placeholder="Opis zamówienia"></textarea>

<input type="hidden" name="_captcha" value="false">

<button type="submit">Wyślij zamówienie</button>

</form>

</div>

<script>
function setLight(){
    document.body.classList.add("light");
    localStorage.setItem("mode","light");
}

function setDark(){
    document.body.classList.remove("light");
    localStorage.setItem("mode","dark");
}

window.onload = () => {
    if(localStorage.getItem("mode")==="light"){
        document.body.classList.add("light");
    }
}
</script>

</body>
</html>
